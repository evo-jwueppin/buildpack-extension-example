name: build-extension.yml
on:
  push:
    branches:
      - 'main'

jobs:
  build-buildpack-extension-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - id: setup-pack
        uses: buildpacks/github-actions/setup-pack@v5.11.0
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - id: build-and-push-extension
        shell: bash
        run: |
          pack extension package ghcr.io/example-scope/buildpack-extension:latest \
          --publish \
          --path ./rsync-extension \
          --format image \
          --target "linux/amd64"
      - id: build-and-push-image
        shell: bash
        run: |
          pack build ghcr.io/evo-jwueppin/buildpack-image-with-extension:latest \
          --volume ~/.m2:/platform/bindings/maven \
          --env "GITHUB_ACTOR=${{ github.actor }}" \
          --env "GITHUB_TOKEN=${{ github.token }}" \
          --env "BP_MAVEN_BUILT_ARTIFACT=target/*.jar" \
          --env "BPE_DEFAULT_LANG=en_US.utf8" \
          --extension ghcr.io/evo-jwueppin/buildpack-extension:latest \
          -B paketobuildpacks/builder-jammy-base:latest \
          --verbose \
          --clear-cache \
          --publish
