name: build-extension.yml
on:
  push:
    branches:
      - 'main'

jobs:
  build-buildpack-extension-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - id: setup-pack
        uses: buildpacks/github-actions/setup-pack@v5.11.0
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - id: build-and-push-extension
        shell: bash
        run: |
          pack extension package ghcr.io/evo-jwueppin/buildpack-extension:latest \
          --publish \
          --path ./rsync-extension \
          --format image \
          --target "linux/amd64"
  build-buildpack-image-with-extension:
    needs: build-buildpack-extension-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - id: setup-pack
        uses: buildpacks/github-actions/setup-pack@v5.11.0
        with:
          pack-version: '0.40.2'
      - id: debug-info
        shell: bash
        run: |
          docker info
          
          pack report
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - id: build-and-push-image
        shell: bash
        run: |
          pack build ghcr.io/evo-jwueppin/buildpack-image-with-extension:latest \
          --extension ghcr.io/evo-jwueppin/buildpack-extension:latest \
          -B paketobuildpacks/builder-jammy-base:latest \
          --verbose \
          --clear-cache \
          --publish
